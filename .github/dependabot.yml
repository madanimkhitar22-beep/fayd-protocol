# Fayd Protocol — Dependabot Configuration
# Automated dependency updates for security and maintenance

version: 2

updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/fayd-node"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    reviewers:
      - "madanimkhitar22-beep"
    groups:
      rust-patch:
        update-types:
          - "patch"
      rust-minor:
        update-types:
          - "minor"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci"
      include: "scope"
    reviewers:
      - "madanimkhitar22-beep"

  # Documentation (if any markdown linting or tools added)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docs"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
